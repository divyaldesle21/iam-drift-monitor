name: IAM Drift Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'

jobs:
  iam-scan:
    name: IAM Privilege Drift Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build scanner image
        run: docker build -t iam-drift-monitor .

      - name: Generate mock plan
        run: |
          echo '{
            "resource_changes": [{
              "address": "aws_iam_role_policy.bad_policy",
              "type": "aws_iam_role_policy",
              "change": {
                "actions": ["create"],
                "after": {
                  "policy": "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"iam:PassRole\",\"s3:DeleteBucket\",\"ec2:*\"],\"Resource\":\"*\"}]}"
                }
              }
            }]
          }' > plan.json

      - name: Run Checkov baseline scan
        run: |
          pip install checkov --quiet
          checkov -d infra --framework terraform --soft-fail

- name: Run custom IAM drift scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            iam-drift-monitor \
            /app/plan.json

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          MESSAGE="IAM Drift Detected - build blocked on ${{ github.repository }} by ${{ github.actor }} - Branch: ${{ github.head_ref }} - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$MESSAGE\"}"